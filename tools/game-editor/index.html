<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deepiri Game Editor — Create Interactive Worlds</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #4ecdc4;
      --secondary: #45b7d1;
      --accent: #6c5ce7;
      --bg-deep: #07070d;
      --bg-surface: #0d0d14;
      --bg-elevated: rgba(18, 18, 28, 0.85);
      --bg-glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.06);
      --text: #e8e8f0;
      --text-dim: rgba(255, 255, 255, 0.35);
      --success: #52c97a;
      --danger: #ff6b6b;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    html { height: 100%; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      height: 100%;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(7, 7, 13, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      flex-shrink: 0;
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: var(--bg-deep);
    }

    .brand {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand h1 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .brand h1 span { color: var(--primary); }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-elevated);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    button:hover {
      border-color: var(--primary);
      background: rgba(78, 205, 196, 0.1);
    }

    button.primary {
      background: var(--primary);
      color: var(--bg-deep);
      border-color: var(--primary);
      font-weight: 600;
    }

    button.primary:hover {
      opacity: 0.9;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 360px;
      background: rgba(13, 13, 20, 0.8);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(7, 7, 13, 0.5);
    }

    .tab {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      background: rgba(78, 205, 196, 0.05);
    }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .section {
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .control-group {
      margin-bottom: 14px;
    }

    .control-label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: var(--text);
    }

    input[type="text"],
    input[type="number"],
    input[type="range"],
    input[type="color"],
    select {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="color"]:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(78, 205, 196, 0.05);
    }

    input[type="range"] {
      padding: 0;
      height: 6px;
      cursor: pointer;
    }

    .value-display {
      display: inline-block;
      background: var(--bg-glass);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      color: var(--primary);
      margin-left: 8px;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .color-swatch:hover {
      transform: scale(1.05);
      border-color: var(--primary);
    }

    .color-swatch.selected {
      border-color: var(--primary);
      box-shadow: 0 0 12px rgba(78, 205, 196, 0.5);
    }

    .canvas-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
      position: relative;
      overflow: hidden;
    }

    .canvas-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(7, 7, 13, 0.6);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    .canvas-area {
      flex: 1;
      position: relative;
      overflow: auto;
    }

    canvas {
      display: block;
      background: linear-gradient(180deg, #1a2a3e 0%, #0a1420 100%);
      width: 100%;
    }

    .preview-controls {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: rgba(7, 7, 13, 0.6);
      display: flex;
      gap: 12px;
    }

    button.icon {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      background: rgba(7, 7, 13, 0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .status {
      display: flex;
      gap: 16px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(78, 205, 196, 0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(78, 205, 196, 0.5); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">🎮</div>
      <div class="brand">
        <h1>Deepiri <span>Game Editor</span></h1>
      </div>
      <div class="header-actions">
        <button onclick="gameEditor.newProject()">New</button>
        <button onclick="gameEditor.loadProject()">Load</button>
        <button class="primary" onclick="gameEditor.save()">Save</button>
        <button class="primary" onclick="gameEditor.playGame()">▶ Play</button>
      </div>
    </header>

    <div class="main">
      <div class="sidebar">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('world')">World</button>
          <button class="tab" onclick="switchTab('entities')">Entities</button>
          <button class="tab" onclick="switchTab('caves')">Caves</button>
          <button class="tab" onclick="switchTab('export')">Export</button>
        </div>

        <!-- World Tab -->
        <div id="world" class="tab-content active">
          <div class="section">
            <div class="section-title">Dimensions</div>
            <div class="control-group">
              <label class="control-label">World Width</label>
              <input type="range" id="worldWidth" min="2000" max="10000" step="500" value="5000" onchange="updatePreview()">
              <span class="value-display" id="worldWidthValue">5000</span>
            </div>
            <div class="control-group">
              <label class="control-label">World Height</label>
              <input type="range" id="worldHeight" min="800" max="3000" step="200" value="1500" onchange="updatePreview()">
              <span class="value-display" id="worldHeightValue">1500</span>
            </div>
            <div class="control-group">
              <label class="control-label">Surface Base</label>
              <input type="range" id="surfaceBase" min="200" max="800" step="50" value="350" onchange="updatePreview()">
              <span class="value-display" id="surfaceBaseValue">350</span>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Physics</div>
            <div class="control-group">
              <label class="control-label">Gravity</label>
              <input type="number" id="gravity" min="0.1" max="2" step="0.1" value="0.55" onchange="updatePreview()">
            </div>
            <div class="control-group">
              <label class="control-label">Jump Force</label>
              <input type="number" id="jumpForce" min="-20" max="-5" step="0.5" value="-11" onchange="updatePreview()">
            </div>
            <div class="control-group">
              <label class="control-label">Move Speed</label>
              <input type="number" id="moveSpeed" min="1" max="10" step="0.5" value="4.5" onchange="updatePreview()">
            </div>
          </div>

          <div class="section">
            <div class="section-title">Colors</div>
            <div class="control-group">
              <label class="control-label">Sky Top</label>
              <input type="color" id="skyTop" value="#0a0a1a" onchange="updatePreview()">
            </div>
            <div class="control-group">
              <label class="control-label">Sky Bottom</label>
              <input type="color" id="skyBottom" value="#1a2a3e" onchange="updatePreview()">
            </div>
            <div class="control-group">
              <label class="control-label">Player Color</label>
              <input type="color" id="playerColor" value="#4ecdc4" onchange="updatePreview()">
            </div>
          </div>
        </div>

        <!-- Entities Tab -->
        <div id="entities" class="tab-content">
          <div class="section">
            <div class="section-title">Spawn Counts</div>
            <div class="control-group">
              <label class="control-label">Platforms <span class="value-display" id="platformCountValue">10</span></label>
              <input type="range" id="platformCount" min="0" max="30" value="10" onchange="updatePreview()">
            </div>
            <div class="control-group">
              <label class="control-label">Portals <span class="value-display" id="portalCountValue">6</span></label>
              <input type="range" id="portalCount" min="0" max="10" value="6" onchange="updatePreview()">
            </div>
            <div class="control-group">
              <label class="control-label">Creatures <span class="value-display" id="creatureCountValue">15</span></label>
              <input type="range" id="creatureCount" min="0" max="50" value="15" onchange="updatePreview()">
            </div>
            <div class="control-group">
              <label class="control-label">Chests <span class="value-display" id="chestCountValue">5</span></label>
              <input type="range" id="chestCount" min="0" max="20" value="5" onchange="updatePreview()">
            </div>
            <div class="control-group">
              <label class="control-label">Crystals <span class="value-display" id="crystalCountValue">8</span></label>
              <input type="range" id="crystalCount" min="0" max="30" value="8" onchange="updatePreview()">
            </div>
            <div class="control-group">
              <label class="control-label">Particles <span class="value-display" id="particleCountValue">60</span></label>
              <input type="range" id="particleCount" min="0" max="200" value="60" onchange="updatePreview()">
            </div>
          </div>

          <div class="section">
            <div class="section-title">World Palette</div>
            <div class="color-grid" id="colorPalette"></div>
          </div>
        </div>

        <!-- Caves Tab -->
        <div id="caves" class="tab-content">
          <div class="section">
            <div class="section-title">Cave Generation</div>
            <div class="control-group">
              <label class="control-label">
                <input type="checkbox" id="caveEnabled" checked onchange="updatePreview()">
                Enable Caves
              </label>
            </div>
            <div class="control-group">
              <label class="control-label">Tunnel Count</label>
              <input type="range" id="tunnelCount" min="5" max="50" value="20" onchange="updatePreview()">
              <span class="value-display" id="tunnelCountValue">20</span>
            </div>
            <div class="control-group">
              <label class="control-label">Chamber Count</label>
              <input type="range" id="chamberCount" min="3" max="20" value="8" onchange="updatePreview()">
              <span class="value-display" id="chamberCountValue">8</span>
            </div>
            <div class="control-group">
              <label class="control-label">Lava Depth</label>
              <input type="range" id="lavaDepth" min="0.5" max="0.95" step="0.05" value="0.75" onchange="updatePreview()">
              <span class="value-display" id="lavaDepthValue">75%</span>
            </div>
          </div>
        </div>

        <!-- Export Tab -->
        <div id="export" class="tab-content">
          <div class="section">
            <div class="section-title">Export Game</div>
            <button onclick="gameEditor.exportHTML()" style="width: 100%; margin-bottom: 10px;">📄 Export as HTML</button>
            <button onclick="gameEditor.exportLYV()" style="width: 100%; margin-bottom: 10px;">💾 Export as LYV</button>
            <button onclick="gameEditor.exportJSON()" style="width: 100%;">📋 Export Config</button>
          </div>

          <div class="section">
            <div class="section-title">Project Info</div>
            <div class="control-group">
              <label class="control-label">Project Name</label>
              <input type="text" id="projectName" placeholder="My Game World" value="My Game World">
            </div>
            <div class="control-group">
              <label class="control-label">Description</label>
              <input type="text" id="projectDesc" placeholder="Describe your world..." value="">
            </div>
          </div>
        </div>
      </div>

      <div class="canvas-container">
        <div class="canvas-header">
          <span>Preview — Click canvas to edit, press SPACE to play</span>
          <span id="coordinates" style="color: var(--primary);">Position: —</span>
        </div>
        <div class="canvas-area">
          <canvas id="previewCanvas"></canvas>
        </div>
        <div class="preview-controls">
          <button class="icon" onclick="gameEditor.zoomIn()" title="Zoom In">🔍+</button>
          <button class="icon" onclick="gameEditor.zoomOut()" title="Zoom Out">🔍−</button>
          <button class="icon" onclick="gameEditor.zoomReset()" title="Reset Zoom">⟲</button>
          <span style="flex: 1;"></span>
          <span style="color: var(--text-dim); font-size: 0.85rem;">Zoom: <span id="zoomLevel">100%</span></span>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="status">
        <div class="status-item">
          <span class="status-dot"></span>
          <span>Ready</span>
        </div>
        <div class="status-item" id="saveStatus" style="display: none;">
          <span class="status-dot" style="background: var(--primary);"></span>
          <span>Changes saved</span>
        </div>
      </div>
      <span id="projectInfo">Untitled Game — 0 entities</span>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
