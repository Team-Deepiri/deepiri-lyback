<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Deepiri Interactive World Wallpaper</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #info {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-family: monospace;
      font-size: 12px;
      z-index: 1;
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div id="info">WASD/Arrows: Move | Space: Jump | E/Click: Interact with portals</div>

  <script src="../../src/interactive-background/core-engine.js"></script>
  <script src="../../src/interactive-background/world-engine.js"></script>
  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const engine = new InteractiveWorld.WorldEngine(canvas, { interactive: true });
    engine.start();
  </script>
</body>
</html>
