<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cavesweat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #07070d; }
    #game { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; }
    #overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; color: #e8e8f0; font-family: system-ui, sans-serif; text-align: center;
      background: radial-gradient(ellipse at center, #0d0d14 0%, #07070d 100%);
      transition: opacity 0.35s;
    }
    #overlay.hide { opacity: 0; pointer-events: none; display: none; }
    .card {
      border: 1px solid rgba(78, 205, 196, 0.25);
      border-radius: 16px;
      padding: 40px 56px;
      background: rgba(13, 13, 20, 0.85);
      max-width: 520px;
    }
    .card h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .card h1 span { color: #4ecdc4; }
    .card p { color: rgba(255,255,255,0.5); font-size: 0.95rem; line-height: 1.5; }
    .card .err { color: #ff8b8b; font-size: 0.85rem; margin-top: 12px; min-height: 1.2em; }
    .card button {
      margin-top: 20px; padding: 12px 28px;
      background: linear-gradient(135deg, #4ecdc4, #45b7d1);
      color: #07070d; border: none; border-radius: 8px;
      font-weight: 600; font-size: 1rem; cursor: pointer;
    }
    .card button:hover { opacity: 0.92; }
    #hud {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.35); font: 12px monospace; z-index: 5;
      pointer-events: none; text-align: center;
    }
    #title {
      position: fixed; top: 14px; left: 20px; z-index: 5;
      color: rgba(255,255,255,0.25); font: 12px system-ui, sans-serif;
      pointer-events: none;
    }
    #settingsBtn {
      position: fixed; top: 14px; right: 16px; z-index: 1000;
      display: none; gap: 6px; align-items: center;
      padding: 8px 14px 8px 12px;
      border: 1px solid rgba(78, 205, 196, 0.5);
      border-radius: 10px; background: rgba(13, 13, 20, 0.92);
      color: #e8e8f0; font: 600 13px system-ui, sans-serif; cursor: pointer;
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.5);
    }
    #settingsBtn .gear { font-size: 1.15rem; line-height: 1; }
    #settingsBtn:hover { border-color: #4ecdc4; color: #4ecdc4; }
    #settingsBtn.visible { display: flex; }
    #settingsPanel {
      position: fixed; inset: 0; z-index: 2000;
      display: none; align-items: center; justify-content: center;
      background: rgba(7, 7, 13, 0.72);
    }
    #settingsPanel.open { display: flex; }
    .settings-card {
      border: 1px solid rgba(78, 205, 196, 0.25);
      border-radius: 16px;
      padding: 28px 32px;
      background: rgba(13, 13, 20, 0.95);
      min-width: 280px; max-width: 360px;
      color: #e8e8f0; font-family: system-ui, sans-serif;
    }
    .settings-card h2 {
      font-size: 1.1rem; font-weight: 600; margin-bottom: 4px;
    }
    .settings-card .sub {
      color: rgba(255,255,255,0.45); font-size: 0.85rem;
      margin-bottom: 20px; line-height: 1.4;
    }
    .settings-actions { display: flex; flex-direction: column; gap: 10px; }
    .settings-actions button {
      padding: 11px 18px; border-radius: 8px; font-size: 0.95rem;
      font-weight: 600; cursor: pointer; border: none;
    }
    .settings-actions .reset-btn {
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      color: #fff;
    }
    .settings-actions .reset-btn:hover { opacity: 0.92; }
    .settings-actions .players-btn {
      background: linear-gradient(135deg, #4ecdc4, #45b7d1);
      color: #07070d;
    }
    .settings-actions .players-btn:hover { opacity: 0.92; }
    .settings-actions .remove-btn {
      background: transparent;
      border: 1px solid rgba(255, 107, 107, 0.45);
      color: #ff9f9f;
    }
    .settings-actions .remove-btn:hover {
      border-color: rgba(255, 107, 107, 0.75);
      color: #ff6b6b;
    }
    .remove-picker {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .remove-picker[hidden] { display: none !important; }
    .remove-picker .remove-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
    }
    .remove-slots {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .player-slot-btn {
      min-width: 44px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 107, 107, 0.4);
      background: rgba(255, 107, 107, 0.12);
      color: #ffb4b4;
      font: 600 0.85rem system-ui, sans-serif;
      cursor: pointer;
    }
    .player-slot-btn:hover {
      background: rgba(255, 107, 107, 0.28);
      border-color: #ff6b6b;
      color: #fff;
    }
    .settings-actions .close-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.65);
    }
    .settings-actions .close-btn:hover {
      border-color: rgba(78, 205, 196, 0.4);
      color: #4ecdc4;
    }
  </style>
</head>
<body>
  <canvas id="game" tabindex="0"></canvas>
  <div id="title"></div>
  <div id="overlay">
    <div class="card">
      <h1><span>Cavesweat</span></h1>
      <p id="desc">Loading world config…</p>
      <div class="err" id="err"></div>
      <button id="playBtn" style="display:none" type="button">▶ Play</button>
    </div>
  </div>
  <button id="settingsBtn" type="button" title="Settings (Esc)" aria-label="Settings">
    <span class="gear" aria-hidden="true">⚙</span>
    <span>Settings</span>
  </button>
  <div id="settingsPanel" role="dialog" aria-labelledby="settingsTitle" aria-modal="true">
    <div class="settings-card">
      <h2 id="settingsTitle">Settings</h2>
      <p class="sub">Pause the game, change players, or reset the world.</p>
      <div class="settings-actions">
        <button id="playersToggleBtn" class="players-btn" type="button">👥 Add 2nd player</button>
        <button id="removePlayerBtn" class="remove-btn" type="button" hidden>➖ Remove player</button>
        <div id="removePlayerPicker" class="remove-picker" hidden>
          <span class="remove-label">Which player should leave?</span>
          <div id="removePlayerSlots" class="remove-slots"></div>
        </div>
        <button id="resetBtn" class="reset-btn" type="button">↻ Reset world</button>
        <button id="closeSettingsBtn" class="close-btn" type="button">Close</button>
      </div>
    </div>
  </div>
  <div id="hud"></div>

  <script src="config.js"></script>
  <script>
    const PLAYER_COUNT_KEY = 'cavesweat-player-count';
    const overlay = document.getElementById('overlay');
    const errEl = document.getElementById('err');
    const descEl = document.getElementById('desc');
    const playBtn = document.getElementById('playBtn');
    const titleEl = document.getElementById('title');
    const hudEl = document.getElementById('hud');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const playersToggleBtn = document.getElementById('playersToggleBtn');
    const removePlayerBtn = document.getElementById('removePlayerBtn');
    const removePlayerPicker = document.getElementById('removePlayerPicker');
    const removePlayerSlots = document.getElementById('removePlayerSlots');
    const resetBtn = document.getElementById('resetBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    let engine = null;
    let pendingRuntime = null;
    let inGame = false;
    let playerCount = Math.min(4, Math.max(1, parseInt(localStorage.getItem(PLAYER_COUNT_KEY) || '1', 10) || 1));

    const PLAYER_NAMES = ['Sweaty', 'Grit', 'Bramble', 'Nimbus'];
    const PLAYER_CONTROLS = ['WASD', 'Arrows', 'IJKL', 'Numpad'];

    function updateHudText() {
      const hints = {
        1: 'WASD / Arrows: Move &nbsp;|&nbsp; Space / W / ↑: Jump &nbsp;|&nbsp; F: Dig &nbsp;|&nbsp; R: Rub &nbsp;|&nbsp; Esc or ⚙: Settings',
        2: `${PLAYER_NAMES[0]}: WASD+Space/W &nbsp;|&nbsp; ${PLAYER_NAMES[1]}: Arrows+RCtrl (↑ jump) &nbsp;|&nbsp; Esc or ⚙: Settings`,
        3: `${PLAYER_NAMES[0]}: WASD+Space/W &nbsp;|&nbsp; ${PLAYER_NAMES[1]}: Arrows (↑ jump) &nbsp;|&nbsp; ${PLAYER_NAMES[2]}: IJKL (I jump) &nbsp;|&nbsp; Esc or ⚙: Settings`,
        4: `${PLAYER_NAMES[0]}: WASD &nbsp;|&nbsp; ${PLAYER_NAMES[1]}: Arrows &nbsp;|&nbsp; ${PLAYER_NAMES[2]}: IJKL &nbsp;|&nbsp; ${PLAYER_NAMES[3]}: Num8426 (8 jump) &nbsp;|&nbsp; Esc or ⚙: Settings`
      };
      hudEl.innerHTML = hints[playerCount] || hints[1];
    }

    function updatePlayersButton() {
      if (playerCount >= 4) {
        playersToggleBtn.textContent = '👤 Solo (1 player)';
      } else {
        const ord = ['2nd', '3rd', '4th'][playerCount - 1];
        playersToggleBtn.textContent = `👥 Add ${ord} player`;
      }
    }

    function updateRemovePlayerUI() {
      removePlayerBtn.hidden = playerCount <= 1;
      removePlayerPicker.hidden = true;
      removePlayerSlots.innerHTML = '';
      const roster = window.InteractiveWorld?.PLAYER_ROSTER;
      for (let i = 1; i <= playerCount; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'player-slot-btn';
        const name = roster?.[i - 1]?.name || PLAYER_NAMES[i - 1] || ('P' + i);
        const controls = PLAYER_CONTROLS[i - 1] || '';
        btn.title = 'Remove ' + name + (controls ? ' (' + controls + ')' : '');
        btn.textContent = name;
        btn.addEventListener('click', () => removePlayer(i));
        removePlayerSlots.appendChild(btn);
      }
    }

    function setPlayerCount(n) {
      playerCount = Math.min(4, Math.max(1, n | 0));
      localStorage.setItem(PLAYER_COUNT_KEY, String(playerCount));
      updatePlayersButton();
      updateHudText();
      updateRemovePlayerUI();
    }

    updateHudText();
    updatePlayersButton();
    updateRemovePlayerUI();

    function openSettings() {
      if (!engine) return;
      removePlayerPicker.hidden = true;
      if (engine.isRunning) {
        engine.stop();
        engine._settingsPaused = true;
      }
      if (engine.keys) {
        for (const k of Object.keys(engine.keys)) engine.keys[k] = false;
      }
      settingsPanel.classList.add('open');
      closeSettingsBtn.focus();
    }

    function closeSettings() {
      settingsPanel.classList.remove('open');
      if (engine && engine._settingsPaused) {
        engine._settingsPaused = false;
        engine.start();
        document.getElementById('game').focus();
      }
    }

    function toggleSettings() {
      if (settingsPanel.classList.contains('open')) {
        closeSettings();
        return;
      }
      if (inGame && engine) openSettings();
    }

    function restartGame() {
      if (!pendingRuntime) return;
      settingsPanel.classList.remove('open');
      if (engine) {
        engine._settingsPaused = false;
        if (engine.destroy) engine.destroy();
        else engine.stop();
        engine = null;
      }
      startGame(pendingRuntime);
    }

    function resetGame() {
      restartGame();
    }

    function cyclePlayers() {
      setPlayerCount(playerCount >= 4 ? 1 : playerCount + 1);
      restartGame();
    }

    function removePlayer(slot) {
      if (playerCount <= 1 || slot < 1 || slot > playerCount) return;
      setPlayerCount(playerCount - 1);
      removePlayerPicker.hidden = true;
      restartGame();
    }

    async function loadWorldConfig() {
      const params = new URLSearchParams(location.search);
      const configPath = params.get('config') || 'world.json';
      const res = await fetch(configPath);
      if (!res.ok) throw new Error(`Could not load ${configPath}`);
      return JSON.parse(await res.text());
    }

    function loadEngineScript() {
      return new Promise((resolve, reject) => {
        if (window.InteractiveWorld?.WorldEngine) { resolve(); return; }
        const s = document.createElement('script');
        s.src = '/src/interactive-background/world-engine.js';
        s.onload = () => {
          if (!window.InteractiveWorld?.WorldEngine) {
            reject(new Error('World engine loaded but did not initialize — hard refresh (Ctrl+Shift+R).'));
            return;
          }
          resolve();
        };
        s.onerror = () => reject(new Error('Could not load the world engine.'));
        document.head.appendChild(s);
      });
    }

    function startGame(runtime) {
      window.DEEPIRI_DEFAULTS = runtime.defaults;
      loadEngineScript().then(() => {
        if (engine) {
          if (engine.destroy) engine.destroy();
          else engine.stop();
          engine = null;
        }
        const canvas = document.getElementById('game');
        engine = new window.InteractiveWorld.WorldEngine(canvas, {
          interactive: true,
          playerCount,
          onSettingsOpen: openSettings,
          onSettingsToggle: toggleSettings
        });
        if (engine.applyWorldConfig) engine.applyWorldConfig(runtime.apply);
        engine.start();
        canvas.focus();
        titleEl.textContent = runtime.meta.name;
        overlay.classList.add('hide');
        settingsBtn.classList.add('visible');
        inGame = true;
        updateRemovePlayerUI();
      }).catch((e) => {
        errEl.textContent = e.message;
      });
    }

    async function boot() {
      try {
        const config = await loadWorldConfig();
        const errors = CavesweatConfig.validateConfig(config);
        if (errors.length) {
          errEl.textContent = errors.join(' · ');
          descEl.textContent = 'Fix world.json and reload.';
          return;
        }
        pendingRuntime = CavesweatConfig.worldConfigToRuntime(config);
        descEl.textContent = pendingRuntime.meta.description;
        playBtn.style.display = 'inline-block';
        // Auto-start when launched from npm (no click needed after first paint)
        if (!location.search.includes('menu=1')) startGame(pendingRuntime);
      } catch (e) {
        errEl.textContent = e.message || 'Failed to load world.json';
        descEl.textContent = 'Edit cavesweat/world.json to customize your world.';
      }
    }

    playBtn.addEventListener('click', () => {
      if (pendingRuntime) startGame(pendingRuntime);
    });

    settingsBtn.addEventListener('click', toggleSettings);
    playersToggleBtn.addEventListener('click', cyclePlayers);
    removePlayerBtn.addEventListener('click', () => {
      removePlayerPicker.hidden = !removePlayerPicker.hidden;
    });
    closeSettingsBtn.addEventListener('click', closeSettings);
    resetBtn.addEventListener('click', resetGame);
    settingsPanel.addEventListener('click', (e) => {
      if (e.target === settingsPanel) closeSettings();
    });

    boot();
  </script>
</body>
</html>
