<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cavesweat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #07070d; }
    #game { position: fixed; inset: 0; width: 100%; height: 100%; }
    #overlay {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; color: #e8e8f0; font-family: system-ui, sans-serif; text-align: center;
      background: radial-gradient(ellipse at center, #0d0d14 0%, #07070d 100%);
      transition: opacity 0.35s;
    }
    #overlay.hide { opacity: 0; pointer-events: none; }
    .card {
      border: 1px solid rgba(78, 205, 196, 0.25);
      border-radius: 16px;
      padding: 40px 56px;
      background: rgba(13, 13, 20, 0.85);
      max-width: 520px;
    }
    .card h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .card h1 span { color: #4ecdc4; }
    .card p { color: rgba(255,255,255,0.5); font-size: 0.95rem; line-height: 1.5; }
    .card .err { color: #ff8b8b; font-size: 0.85rem; margin-top: 12px; min-height: 1.2em; }
    .card button {
      margin-top: 20px; padding: 12px 28px;
      background: linear-gradient(135deg, #4ecdc4, #45b7d1);
      color: #07070d; border: none; border-radius: 8px;
      font-weight: 600; font-size: 1rem; cursor: pointer;
    }
    .card button:hover { opacity: 0.92; }
    #hud {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.35); font: 12px monospace; z-index: 5;
      pointer-events: none; text-align: center;
    }
    #title {
      position: fixed; top: 14px; left: 20px; z-index: 5;
      color: rgba(255,255,255,0.25); font: 12px system-ui, sans-serif;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="title"></div>
  <div id="overlay">
    <div class="card">
      <h1><span>Cavesweat</span></h1>
      <p id="desc">Loading world config…</p>
      <div class="err" id="err"></div>
      <button id="playBtn" style="display:none" type="button">▶ Play</button>
    </div>
  </div>
  <div id="hud">
    WASD / Arrows: Move &nbsp;|&nbsp; Space: Jump &nbsp;|&nbsp; E: Interact &nbsp;|&nbsp; F: Dig &nbsp;|&nbsp; M: Minimap
  </div>

  <script src="config.js"></script>
  <script>
    const overlay = document.getElementById('overlay');
    const errEl = document.getElementById('err');
    const descEl = document.getElementById('desc');
    const playBtn = document.getElementById('playBtn');
    const titleEl = document.getElementById('title');
    let engine = null;
    let pendingRuntime = null;

    async function loadWorldConfig() {
      const params = new URLSearchParams(location.search);
      const configPath = params.get('config') || 'world.json';
      const res = await fetch(configPath);
      if (!res.ok) throw new Error(`Could not load ${configPath}`);
      return JSON.parse(await res.text());
    }

    function loadEngineScript() {
      return new Promise((resolve, reject) => {
        if (window.InteractiveWorld) { resolve(); return; }
        const s = document.createElement('script');
        s.src = '../src/interactive-background/world-engine.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Could not load the world engine.'));
        document.head.appendChild(s);
      });
    }

    function startGame(runtime) {
      window.DEEPIRI_DEFAULTS = runtime.defaults;
      loadEngineScript().then(() => {
        if (engine && engine.stop) engine.stop();
        const canvas = document.getElementById('game');
        engine = new window.InteractiveWorld.WorldEngine(canvas, { interactive: true });
        if (engine.applyWorldConfig) engine.applyWorldConfig(runtime.apply);
        engine.start();
        titleEl.textContent = runtime.meta.name;
        overlay.classList.add('hide');
      }).catch((e) => {
        errEl.textContent = e.message;
      });
    }

    async function boot() {
      try {
        const config = await loadWorldConfig();
        const errors = CavesweatConfig.validateConfig(config);
        if (errors.length) {
          errEl.textContent = errors.join(' · ');
          descEl.textContent = 'Fix world.json and reload.';
          return;
        }
        pendingRuntime = CavesweatConfig.worldConfigToRuntime(config);
        descEl.textContent = pendingRuntime.meta.description;
        playBtn.style.display = 'inline-block';
        // Auto-start when launched from npm (no click needed after first paint)
        if (!location.search.includes('menu=1')) startGame(pendingRuntime);
      } catch (e) {
        errEl.textContent = e.message || 'Failed to load world.json';
        descEl.textContent = 'Edit cavesweat/world.json to customize your world.';
      }
    }

    playBtn.addEventListener('click', () => {
      if (pendingRuntime) startGame(pendingRuntime);
    });

    boot();
  </script>
</body>
</html>
